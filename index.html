<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pintar Ceria</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';</script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
</head>
<body class="p-4 bg-yellow-50">
  <div class="max-w-3xl mx-auto bg-white rounded-2xl border p-6 space-y-4">
    <h1 class="text-2xl font-bold">⚙️ Panel Admin Guru</h1>

    <select id="adminMapelSelect" class="w-full border rounded p-2" onchange="loadAdminDataForMapel()">
      <option value="" disabled selected>-- Pilih Mapel --</option>
    </select>

    <div id="adminUploadArea" class="hidden space-y-3">
      <input type="file" id="adminMateriFile" accept=".txt,.pdf,.docx,.jpg,.jpeg,.png" multiple class="w-full" />
      <p id="adminMateriStatus" class="text-sm text-gray-600">Status: Belum ada materi tersimpan.</p>

      <input type="file" id="adminKisiFile" accept=".txt,.pdf,.docx" class="w-full" />
      <p id="adminKisiStatus" class="text-sm text-gray-600">Status: Belum ada kisi-kisi tersimpan.</p>

      <input type="number" id="adminJumlahSoal" value="10" min="1" max="50" class="w-full border rounded p-2" />

      <button id="btnSaveAdmin" onclick="saveAdminDataAndGenerateQuestions()" class="bg-black text-white px-4 py-2 rounded">✨ Proses Referensi & Buat Soal Sekarang!</button>

      <div id="adminLoadingText" class="hidden text-blue-700 font-semibold">Bu Guru AI sedang meracik soal...</div>
      <div id="adminSuccessMsg" class="hidden text-green-700 font-semibold">✅ Berhasil! <span id="adminBankSoalCount">0</span> soal tersimpan.</div>
    </div>
  </div>

  <div id="customModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl p-4 max-w-md w-full">
      <h3 id="modalTitle" class="font-bold mb-2">Pemberitahuan</h3>
      <p id="modalMessage" class="text-sm whitespace-pre-line"></p>
      <button onclick="closeModal()" class="mt-3 bg-pink-500 text-white px-3 py-2 rounded">OK</button>
    </div>
  </div>

  <script>
    // Isi API key valid via deploy config/env injection
    const apiKey = "";
    const GEMINI_MODELS = ["gemini-1.5-flash", "gemini-1.5-pro"];

    localforage.config({ name: 'PintarCeriaDB', storeName: 'referensi_mapel' });

    const mapelList = [
      { id: "mtk", name: "Matematika" },
      { id: "indo", name: "Bahasa Indonesia" },
      { id: "ipas", name: "IPAS" },
      { id: "inggris", name: "Bahasa Inggris" }
    ];

    function showModal(title, message) {
      document.getElementById('modalTitle').innerText = title;
      document.getElementById('modalMessage').innerText = message;
      document.getElementById('customModal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('customModal').classList.add('hidden'); }

    function setupAdminSelect() {
      const select = document.getElementById('adminMapelSelect');
      mapelList.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.innerText = m.name;
        select.appendChild(opt);
      });
    }

    async function loadAdminDataForMapel() {
      const mapelId = document.getElementById('adminMapelSelect').value;
      if (!mapelId) return;
      document.getElementById('adminUploadArea').classList.remove('hidden');
      document.getElementById('adminSuccessMsg').classList.add('hidden');

      try {
        const data = await localforage.getItem(mapelId);
        document.getElementById('adminMateriStatus').innerText = data?.materiText ? `✅ Tersimpan: Materi (${data.materiText.length} karakter)` : 'Status: Belum ada materi khusus.';
        document.getElementById('adminKisiStatus').innerText = data?.kisiText ? `✅ Tersimpan: Kisi-kisi (${data.kisiText.length} karakter)` : 'Status: Belum ada kisi-kisi khusus.';
      } catch (_) {
        document.getElementById('adminMateriStatus').innerText = 'Status: Belum ada materi.';
        document.getElementById('adminKisiStatus').innerText = 'Status: Belum ada kisi-kisi.';
      }
    }

    async function extractTextFromPDF(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(' ') + '\n';
      }
      return fullText;
    }

    async function extractTextFromDocx(file) {
      const result = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
      return result.value;
    }

    function extractBase64FromImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({ mimeType: file.type, data: reader.result.split(',')[1] });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function getErrorMessageByStatus(status, detail = '') {
      if (status === 400) return 'Permintaan tidak valid (400). Cek format payload.';
      if (status === 401) return 'API Key tidak valid / kosong (401).';
      if (status === 403) return 'Akses ditolak (403). Cek izin API key / project.';
      if (status === 404) return 'Model tidak ditemukan (404). Ganti model.';
      if (status === 429) return 'Rate limit/kuota habis (429). Coba lagi sebentar.';
      if (status >= 500) return 'Server AI sedang gangguan (5xx).';
      return `HTTP ${status}. ${detail}`;
    }

    async function fetchWithRetryPayload(contents, systemInstructionText, isJson = false) {
      if (!apiKey || !apiKey.trim()) {
        throw new Error('API Key kosong. Isi variabel apiKey terlebih dahulu.');
      }

      const maxRetries = 3;
      const delays = [1200, 2500, 5000];
      const payload = { contents };
      if (systemInstructionText) payload.systemInstruction = { parts: [{ text: systemInstructionText }] };
      if (isJson) payload.generationConfig = { responseMimeType: 'application/json' };

      let lastError = '';

      for (const model of GEMINI_MODELS) {
        for (let i = 0; i < maxRetries; i++) {
          try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (!response.ok) {
              const detail = await response.text();
              const msg = getErrorMessageByStatus(response.status, detail);

              if ([400, 401, 403, 404].includes(response.status)) {
                throw new Error(`${msg} | model=${model}`);
              }

              lastError = `${msg} | model=${model}`;
              if (i < maxRetries - 1) {
                await new Promise(r => setTimeout(r, delays[i]));
                continue;
              }
              break;
            }

            return await response.json();
          } catch (err) {
            lastError = err?.message || String(err);
            if (i < maxRetries - 1) {
              await new Promise(r => setTimeout(r, delays[i]));
              continue;
            }
          }
        }
      }

      throw new Error(`Gagal menghubungi AI setelah retry. Detail: ${lastError}`);
    }

    function extractAiText(response) {
      const text = response?.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('\n').trim();
      if (!text) throw new Error('Respons AI kosong / candidates tidak tersedia.');
      return text;
    }

    function parseQuestionsJson(rawText) {
      const cleaned = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();

      try {
        const direct = JSON.parse(cleaned);
        if (Array.isArray(direct)) return direct;
        if (Array.isArray(direct?.questions)) return direct.questions;
      } catch (_) {}

      const m = cleaned.match(/\[[\s\S]*\]/);
      if (m) {
        const parsed = JSON.parse(m[0]);
        if (Array.isArray(parsed)) return parsed;
      }

      throw new Error('Format JSON soal tidak valid.');
    }

    function sanitizeQuestions(questions, jumlahSoal) {
      return (questions || [])
        .filter(q => q && q.question && q.answer)
        .map(q => ({
          materi: q.materi || 'Materi Umum',
          type: q.type === 'pg' ? 'pg' : 'isian',
          question: String(q.question).trim(),
          options: Array.isArray(q.options) ? q.options.slice(0, 5) : undefined,
          answer: String(q.answer).trim(),
          explanation: q.explanation ? String(q.explanation).trim() : 'Tetap semangat belajar ya!'
        }))
        .filter(q => q.type !== 'pg' || (Array.isArray(q.options) && q.options.length >= 2))
        .slice(0, jumlahSoal);
    }

    async function saveAdminDataAndGenerateQuestions() {
      const mapelId = document.getElementById('adminMapelSelect').value;
      if (!mapelId) return showModal('Perhatian', 'Pilih mapel dulu.');

      const selectedMapelObj = mapelList.find(m => m.id === mapelId);
      const jumlahSoal = parseInt(document.getElementById('adminJumlahSoal').value, 10) || 10;
      const btn = document.getElementById('btnSaveAdmin');
      const loadingUI = document.getElementById('adminLoadingText');
      const successMsg = document.getElementById('adminSuccessMsg');

      btn.disabled = true;
      loadingUI.classList.remove('hidden');
      successMsg.classList.add('hidden');

      try {
        let newMateriText = '';
        let newKisiText = '';
        let newImages = [];

        const materiFiles = document.getElementById('adminMateriFile').files;
        for (const f of materiFiles) {
          if (f.name.endsWith('.pdf')) newMateriText += await extractTextFromPDF(f) + '\n';
          else if (f.name.endsWith('.docx')) newMateriText += await extractTextFromDocx(f) + '\n';
          else if (f.name.endsWith('.txt')) newMateriText += await f.text() + '\n';
          else if (f.type.startsWith('image/')) newImages.push(await extractBase64FromImage(f));
        }

        const kisiFile = document.getElementById('adminKisiFile').files[0];
        if (kisiFile) {
          if (kisiFile.name.endsWith('.pdf')) newKisiText = await extractTextFromPDF(kisiFile);
          else if (kisiFile.name.endsWith('.docx')) newKisiText = await extractTextFromDocx(kisiFile);
          else if (kisiFile.name.endsWith('.txt')) newKisiText = await kisiFile.text();
        }

        const existing = await localforage.getItem(mapelId) || { materiText: '', kisiText: '', images: [], questions: [] };
        const finalMateri = materiFiles.length > 0 ? newMateriText : existing.materiText;
        const finalKisi = kisiFile ? newKisiText : existing.kisiText;
        const finalImages = materiFiles.length > 0 ? newImages : existing.images;

        const sysInstruction = `Kamu adalah 'Bu Guru Ceria', pembuat soal ahli untuk SD kelas 5 Kurikulum Merdeka.
Buatkan soal ujian mapel ${selectedMapelObj.name}. Jumlah: ${jumlahSoal} SOAL.
Variasi Tipe: "pg", "isian", "cerita".
Keluarkan HANYA JSON VALID format array.`;

        let promptContext = `Buatkan ${jumlahSoal} soal mapel ${selectedMapelObj.name} Kelas 5 SD.`;
        if (finalKisi) promptContext += `\n\n[KISI-KISI SOAL]:\n${finalKisi.substring(0, 5000)}`;
        if (finalMateri) promptContext += `\n\n[REFERENSI MATERI]:\n${finalMateri.substring(0, 15000)}`;

        const contents = [{ role: 'user', parts: [{ text: promptContext }] }];
        if (finalImages?.length) {
          finalImages.slice(0, 3).forEach(img => {
            contents[0].parts.push({ inlineData: { mimeType: img.mimeType, data: img.data } });
          });
        }

        const response = await fetchWithRetryPayload(contents, sysInstruction, true);
        const aiText = extractAiText(response);
        const rawQuestions = parseQuestionsJson(aiText);
        const questions = sanitizeQuestions(rawQuestions, jumlahSoal);

        if (!questions.length) {
          throw new Error('AI tidak mengembalikan soal valid. Coba kurangi jumlah soal / sederhanakan materi.');
        }

        await localforage.setItem(mapelId, {
          materiText: finalMateri,
          kisiText: finalKisi,
          images: finalImages,
          questions
        });

        document.getElementById('adminBankSoalCount').innerText = questions.length;
        successMsg.classList.remove('hidden');
      } catch (e) {
        showModal('Gagal Menyiapkan Soal', e?.message || String(e));
      } finally {
        btn.disabled = false;
        loadingUI.classList.add('hidden');
        await loadAdminDataForMapel();
      }
    }

    setupAdminSelect();
  </script>
</body>
</html>
